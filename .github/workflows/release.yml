name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (X.Y.Z)'
        required: true

permissions:
  contents: write

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       (startsWith(github.event.pull_request.head.ref, '1.') ||
        startsWith(github.event.pull_request.head.ref, '2.')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.event.pull_request.head.ref }}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version '$VERSION' is not valid (expected X.Y.Z). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve previous tag
        if: steps.version.outputs.skip != 'true'
        id: prev
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Build changelog
        if: steps.version.outputs.skip != 'true'
        run: |
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"
          {
            echo "## What's Changed"
            echo ""
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "${{ github.event.pull_request.title }} by @${{ github.event.pull_request.user.login }} in #${{ github.event.pull_request.number }}"
              echo ""
            fi
            echo "### Commits"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "refs/tags/${PREV_TAG}..HEAD" \
                --perl-regexp --author='^(?!.*[Cc]laude).*$' \
                --oneline --no-merges | sed 's/^/- /'
            else
              git log \
                --perl-regexp --author='^(?!.*[Cc]laude).*$' \
                --oneline --no-merges | sed 's/^/- /'
            fi
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.tag }}"
            fi
          } > release_notes.md
          cat release_notes.md

      - name: Create tag if missing
        if: steps.version.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote, skipping tag creation."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping."
            exit 0
          fi
          gh release create "${TAG}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release_notes.md \
            --target main
